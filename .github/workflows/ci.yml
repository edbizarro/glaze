name: CI

on:
  pull_request:
    paths:
      - ".claude-plugin/**"
      - "skills/**"
      - "package.json"
      - "bun.lock"
      - ".stylelintrc.json"
      - ".htmlvalidate.json"
      - ".github/workflows/**"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  manifests:
    name: Validate manifests (JSON Schema)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: plugin.json
        run: >-
          uvx check-jsonschema
          --schemafile https://json.schemastore.org/claude-code-plugin-manifest.json
          .claude-plugin/plugin.json
      - name: marketplace.json
        run: >-
          uvx check-jsonschema
          --schemafile https://json.schemastore.org/claude-code-marketplace.json
          .claude-plugin/marketplace.json

  plugin-validate:
    name: claude plugin validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @anthropic-ai/claude-code
      # Canonical native gate: validates plugin.json + skill/agent/command
      # frontmatter + hooks.json. Structural/offline (no API key required).
      # Add `--strict` to also fail on warnings (e.g. skill name casing).
      - run: claude plugin validate .

  lint-artifacts:
    name: Lint artifacts (CSS + HTML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run lint
